name: Build The Arts Wire

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Build the digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python aggregator.py --langs es,fr,de,pt,it,zh,ja,ko,ar,hi,ru,tr
      - uses: actions/upload-pages-artifact@v3
        with:
          path: output
      - name: Persist translation cache
        continue-on-error: true
        run: |
          if [ -n "$(git status --porcelain translations.json)" ]; then
            git config user.name "arts-wire-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add translations.json
            git commit -m "chore: update translation cache [skip ci]"
            git push origin HEAD:main
          else
            echo "translation cache unchanged"
          fi
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
